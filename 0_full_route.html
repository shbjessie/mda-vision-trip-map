<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>2026 MDA 튀르키예 해외연수 · 전체 종합 지도</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-polylinedecorator@1.6.0/dist/leaflet.polylineDecorator.js"></script>
<style>
  :root{
    --terra:#B85042;--terra-dk:#8E3B30;--sage:#7A9B76;--sage-dk:#5C7A58;
    --sand:#EAE3D7;--ink:#3A2E28;--paper:#FBF8F3;--muted:#A89B8C;
    --gold:#C77B3A;--blue:#4A6E8A;
  }
  html,body{margin:0;padding:0;font-family:'Nanum Gothic',sans-serif;background:var(--paper);}
  #wrap{position:relative;height:100vh;width:100vw;}
  #map{height:100%;width:100%;}
  .titlecard{position:absolute;top:18px;left:18px;z-index:1000;background:var(--paper);
    border:2px solid var(--terra);border-radius:12px;padding:14px 18px;max-width:430px;
    box-shadow:0 4px 14px rgba(58,46,40,.18);}
  .titlecard h1{margin:0 0 4px;font-size:19px;font-weight:800;color:var(--terra-dk);}
  .titlecard p{margin:0;font-size:12.5px;color:var(--ink);line-height:1.5;}
  .ctrl{position:absolute;top:18px;right:18px;z-index:1000;background:var(--paper);
    border:2px solid var(--terra);border-radius:12px;padding:12px 15px;font-size:13px;
    color:var(--ink);box-shadow:0 4px 14px rgba(58,46,40,.18);}
  .ctrl label{display:block;margin:5px 0;cursor:pointer;white-space:nowrap;}
  .ctrl input{margin-right:7px;vertical-align:middle;}
  .ctrl .swatch{display:inline-block;width:12px;height:12px;border-radius:3px;
    margin-right:6px;vertical-align:middle;border:1.5px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.12);}
  .leaflet-popup-content{font-family:'Nanum Gothic',sans-serif;font-size:13px;color:var(--ink);line-height:1.55;}
  .leaflet-popup-content b{color:var(--terra-dk);}
  .leaflet-popup-content .meta{color:var(--muted);font-size:12px;}
  .pin{width:24px;height:24px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);
    border:2px solid #fff;box-shadow:0 2px 6px rgba(58,46,40,.35);
    display:flex;align-items:center;justify-content:center;}
  .pin span{transform:rotate(45deg);color:#fff;font-weight:800;font-size:11px;}
  .pin.visit{background:var(--terra);}
  .pin.hotel{background:var(--blue);}
  .pin.food{background:var(--gold);}
  .leaflet-tooltip.tt{color:#fff;font-family:'Nanum Gothic',sans-serif;font-weight:700;
    font-size:11.5px;padding:2px 8px;border-radius:6px;border:1.5px solid #fff;
    box-shadow:0 2px 5px rgba(58,46,40,.30);white-space:nowrap;}
  .leaflet-tooltip.tt::before{display:none;}
  .leaflet-tooltip.tt-visit{background:var(--terra);}
  .leaflet-tooltip.tt-hotel{background:var(--blue);}
  .leaflet-tooltip.tt-food{background:var(--gold);}
  .leaflet-tooltip.tt-air{background:var(--muted);}
</style>
</head>
<body>
<div id="wrap">
  <div class="titlecard">
    <h1>2026 MDA 튀르키예 해외연수 · 전체 종합 지도</h1>
    <p>7/13–22 · 방문지 · 호텔 · 식당 · 이동 동선<br>우측 상단에서 항목을 켜고 끌 수 있습니다 (핀 클릭 시 상세)</p>
  </div>
  <div class="ctrl">
    <label><input type="checkbox" id="cVisit" checked><span class="swatch" style="background:var(--terra)"></span>방문지</label>
    <label><input type="checkbox" id="cHotel" checked><span class="swatch" style="background:var(--blue)"></span>호텔</label>
    <label><input type="checkbox" id="cFood" checked><span class="swatch" style="background:var(--gold)"></span>식당</label>
    <label><input type="checkbox" id="cRoute" checked><span class="swatch" style="background:var(--sage)"></span>이동 동선</label>
    <div style="font-size:11px;color:var(--muted);margin:6px 0 0;padding-top:6px;border-top:1px solid var(--sand);line-height:1.5;">
      <span style="border-top:2px dashed var(--terra);display:inline-block;width:18px;vertical-align:middle;margin-right:5px;"></span>국내선 항공<br>
      <span style="border-top:2px solid var(--sage);display:inline-block;width:18px;vertical-align:middle;margin-right:5px;"></span>버스 (차낙칼레→유럽 경유)
    </div>
  </div>
  <div id="map"></div>
</div>
<script>
const map = L.map('map').setView([39.3, 28.5], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution:'&copy; OpenStreetMap &copy; CARTO', maxZoom:19, subdomains:'abcd'
}).addTo(map);

const visits = [
  ["이스탄불 도착", 41.0082, 28.9784, "1일", "인천 → 이스탄불 (KE955)"],
  ["비시디아 안디옥", 38.30829, 31.18956, "2일", "바울·바나바가 유대인 회당에서 복음을 전한 곳 (얄바츠)"],
  ["히에라폴리스·파묵칼레", 37.92488, 29.12324, "3일", "하얀 석회붕 · 사도 빌립의 순교터"],
  ["라오디게아", 37.83674, 29.10878, "3일", "소아시아 7교회 — 미지근한 교회 (계 3장)"],
  ["골로새", 37.78725, 29.26044, "3일", "골로새서의 무대"],
  ["밀레도", 37.53060, 27.27606, "4일", "에베소 장로들과 고별 설교 (행 20장)"],
  ["에베소", 37.94093, 27.34146, "5일", "대극장 · 셀수스 도서관 · 에베소 교회 (계 2장)"],
  ["사도요한 기념교회", 37.95302, 27.36697, "5일", "사도 요한의 무덤 위에 세워진 교회 (셀축)"],
  ["서머나 (이즈미르)", 38.41884, 27.13906, "6일", "스미르나 아고라 · 고난받는 교회 (계 2장)"],
  ["버가모", 39.13130, 27.18614, "6일", "아크로폴리스 · 사탄의 권좌 (계 2장)"],
  ["앗소", 39.49014, 26.33510, "7일", "바울이 홀로 걸어 도착한 항구 (행 20장)"],
  ["알렉산드리아 드로아", 39.75172, 26.15879, "7일", "마게도냐의 환상 (행 16장)"],
  ["트로이", 39.95759, 26.23974, "7일", "호메로스의 트로이 유적"],
  ["1915 차낙칼레 대교", 40.33891, 26.63813, "8일", "다르다넬스 해협 세계 최장 현수교"],
  ["보스포러스 해협", 41.0175, 28.9740, "8일", "유럽·아시아를 잇는 해협 유람선"],
  ["성 소피아 사원", 41.00858, 28.98018, "9일", "비잔틴 건축의 정수"],
  ["블루 모스크·히포드럼", 41.00541, 28.97681, "9일", "여섯 첨탑의 모스크 · 오벨리스크"],
  ["발랏 지구", 41.02922, 28.95173, "9일", "성 요르고스 성당 · 파나르 신학교 조망"],
  ["그랜드 바자르", 41.01068, 28.96807, "9일", "세계 최대 규모의 전통 시장"],
  ["탁심·이스티클랄 거리", 41.03379, 28.97795, "10일", "현대 이스탄불의 중심 번화가"]
];

const hotels = [
  ["CLARION HOTEL ISTANBUL MAHMUTBEY", 41.05574, 28.81855, "7/13, 7/20-21", "5성 · Mahmutbey, Bağcılar/İstanbul"],
  ["LYCUS RIVER THERMAL HOTEL", 37.95435, 29.10963, "7/14-15", "5성 · Karahayıt, Pamukkale"],
  ["ÇİDİHAN HOTEL", 37.71704, 27.22049, "7/16-17", "3성 · Güzelçamlı, Kuşadası/Aydın"],
  ["RAMADA BY WYNDHAM SOMA", 39.18437, 27.54890, "7/18", "4성 · Turgutalp, Soma/Manisa"],
  ["FIGEN HOTEL", 40.14707, 26.41761, "7/19", "3성 · İsmetpaşa, Çanakkale Merkez"]
];

const foods = [
  ["MIDAS 휴게소", 38.06400, 30.15000, "중식 (7/14)", "얄바츠 경로변 휴게 · 스프,샐러드,사츠카우르마"],
  ["파묵칼레 인근 식당", 37.92000, 29.12000, "중식 (7/15)", "KIRCICEGI · 계절샐러드,닭고기 베이티"],
  ["이스탄불 한식당 (TEBEK)", 41.01000, 28.97000, "석식 (7/21-22)", "고등어조림,잡채,미역국,파전 등 한식"]
];

const gVisit = L.layerGroup(), gHotel = L.layerGroup(), gFood = L.layerGroup(), gRoute = L.layerGroup();

visits.forEach((v, i) => {
  const icon = L.divIcon({className:'', html:`<div class="pin visit"><span>${i+1}</span></div>`, iconSize:[24,24], iconAnchor:[12,24]});
  L.marker([v[1], v[2]], {icon}).bindPopup(`<b>${v[0]}</b> <span class="meta">(${v[3]})</span><br>${v[4]}`)
    .bindTooltip(`${i+1}. ${v[0]}`, {direction:'right', offset:[8,-12], className:'tt tt-visit'}).addTo(gVisit);
});
hotels.forEach(h => {
  const icon = L.divIcon({className:'', html:`<div class="pin hotel"><span>H</span></div>`, iconSize:[24,24], iconAnchor:[12,24]});
  L.marker([h[1], h[2]], {icon}).bindPopup(`<b>${h[0]}</b><br><span class="meta">${h[4]}</span><br>숙박: ${h[3]}`)
    .bindTooltip(h[0], {direction:'right', offset:[8,-12], className:'tt tt-hotel'}).addTo(gHotel);
});
foods.forEach(f => {
  const icon = L.divIcon({className:'', html:`<div class="pin food"><span>F</span></div>`, iconSize:[24,24], iconAnchor:[12,24]});
  L.marker([f[1], f[2]], {icon}).bindPopup(`<b>${f[0]}</b> <span class="meta">(${f[3]})</span><br>${f[4]}`)
    .bindTooltip(f[0], {direction:'right', offset:[8,-12], className:'tt tt-food'}).addTo(gFood);
});

const SAGE = '#7A9B76', TERRA = '#B85042';

// 데니즐리 공항 (국내선 도착지)
L.marker([37.774026, 29.6910715], {icon: L.divIcon({className:'',
  html:`<div class="pin" style="background:var(--muted)"><span>✈</span></div>`,
  iconSize:[24,24], iconAnchor:[12,24]})})
  .bindPopup(`<b>데니즐리 차르닥 공항</b><br><span class="meta">국내선 도착 (TK / 이스탄불발)</span><br>2일차 · 파묵칼레 방면 관문`)
  .bindTooltip("데니즐리 공항", {direction:'right', offset:[8,-12], className:'tt tt-air'})
  .addTo(gRoute);

function drawArrow(latlngs, color, dashed, group) {
  const pl = L.polyline(latlngs, {color, weight:2.8, opacity:0.8, dashArray: dashed ? '8,7' : null}).addTo(group);
  L.polylineDecorator(pl, {patterns:[{offset:'5%', repeat:'12%',
    symbol:L.Symbol.arrowHead({pixelSize:9, polygon:true,
      pathOptions:{stroke:false, fill:true, fillColor:color, fillOpacity:0.9}})}]}).addTo(group);
}
drawArrow([[41.0082,28.9784],[37.774026,29.6910715]], TERRA, true, gRoute);
const busPts = [[37.774026,29.6910715]];
for (let i = 1; i <= 13; i++) busPts.push([visits[i][1], visits[i][2]]);
drawArrow(busPts, SAGE, false, gRoute);
const europeRoute = [[40.33891,26.63813],[40.4110,26.6750],[40.6180,27.0870],[40.9780,27.5110],[41.0175,28.9740]];
drawArrow(europeRoute, SAGE, false, gRoute);

gVisit.addTo(map); gHotel.addTo(map); gFood.addTo(map); gRoute.addTo(map);
function bind(id, grp){ document.getElementById(id).addEventListener('change', e=>{ if(e.target.checked) grp.addTo(map); else map.removeLayer(grp); }); }
bind('cVisit', gVisit); bind('cHotel', gHotel); bind('cFood', gFood); bind('cRoute', gRoute);
map.fitBounds(visits.map(v => [v[1], v[2]]), {padding:[70,70]});
</script>
</body>
</html>
