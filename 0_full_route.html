<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>2026 MDA 튀르키예 해외연수 — 전체 이동 경로</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-polylinedecorator@1.6.0/dist/leaflet.polylineDecorator.js"></script>
<style>
  :root{
    --terra:#B85042;      /* 테라코타 (메인) */
    --terra-dk:#8E3B30;
    --sage:#7A9B76;       /* 세이지 (보조/이동) */
    --sage-dk:#5C7A58;
    --sand:#EAE3D7;       /* 모래색 (배경/박스) */
    --ink:#3A2E28;        /* 짙은 갈색 텍스트 */
    --paper:#FBF8F3;
  }
  html,body{margin:0;padding:0;font-family:'Nanum Gothic',sans-serif;background:var(--paper);}
  #wrap{position:relative;height:100vh;width:100vw;}
  #map{height:100%;width:100%;}
  .titlecard{
    position:absolute;top:18px;left:18px;z-index:1000;
    background:var(--paper);border:2px solid var(--terra);
    border-radius:12px;padding:14px 18px;max-width:430px;
    box-shadow:0 4px 14px rgba(58,46,40,.18);
  }
  .titlecard h1{margin:0 0 4px;font-size:20px;font-weight:800;color:var(--terra-dk);}
  .titlecard p{margin:0;font-size:13px;color:var(--ink);line-height:1.5;}
  .legend{
    position:absolute;bottom:24px;right:18px;z-index:1000;
    background:var(--paper);border:2px solid var(--terra);
    border-radius:12px;padding:12px 16px;font-size:13px;color:var(--ink);
    box-shadow:0 4px 14px rgba(58,46,40,.18);
  }
  .legend .row{display:flex;align-items:center;margin:5px 0;}
  .legend .dot{width:14px;height:14px;border-radius:50%;margin-right:9px;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.15);}
  .legend .line{width:26px;height:0;margin-right:9px;border-top:3px solid;}
  .pin-num{
    background:var(--terra);color:#fff;font-weight:800;font-size:13px;
    width:26px;height:26px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);
    border:2px solid #fff;box-shadow:0 2px 6px rgba(58,46,40,.35);
    display:flex;align-items:center;justify-content:center;
  }
  .pin-num span{transform:rotate(45deg);font-family:'Nanum Gothic',sans-serif;}
  .leaflet-popup-content{font-family:'Nanum Gothic',sans-serif;font-size:13px;color:var(--ink);}
  .leaflet-popup-content b{color:var(--terra-dk);}

  /* Leaflet tooltip 라벨 스타일 */
  .leaflet-tooltip.pin-tt {
    background: var(--terra);
    color: #fff;
    font-family: 'Nanum Gothic', sans-serif;
    font-weight: 700;
    font-size: 12px;
    padding: 3px 9px;
    border-radius: 7px;
    border: 1.5px solid #fff;
    box-shadow: 0 2px 6px rgba(58,46,40,.30);
    white-space: nowrap;
  }
  .leaflet-tooltip.pin-tt::before { display:none; }
  .leaflet-tooltip.pin-tt-ref {
    background: var(--muted);
    color: #fff;
    font-family: 'Nanum Gothic', sans-serif;
    font-weight: 700;
    font-size: 12px;
    padding: 3px 9px;
    border-radius: 7px;
    border: 1.5px solid #fff;
    box-shadow: 0 2px 6px rgba(58,46,40,.25);
    white-space: nowrap;
  }
  .leaflet-tooltip.pin-tt-ref::before { display:none; }
</style>
</head>
<body>
<div id="wrap">
  <div class="titlecard">
    <h1>2026 MDA 튀르키예 해외연수 · 전체 이동 경로</h1>
    <p>이스탄불 → 데니즐리 → 비시디아 안디옥 → 에게해 연안 → 차낙칼레 → 이스탄불<br>9박 11일 · 번호는 방문 순서</p>
  </div>
  <div class="legend">
    <div class="row"><span class="dot" style="background:var(--terra)"></span>방문 도시 (순서)</div>
    <div class="row"><span class="line" style="border-color:var(--sage)"></span>버스 이동</div>
    <div class="row"><span class="line" style="border-color:var(--terra);border-top-style:dashed"></span>국내선 항공</div>
  </div>
  <div id="map"></div>
</div>
<script>
const map = L.map('map', {zoomControl:true}).setView([39.2, 28.8], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution:'&copy; OpenStreetMap &copy; CARTO', maxZoom:19, subdomains:'abcd'
}).addTo(map);

const TERRA='#B85042', SAGE='#7A9B76';

// 방문 순서 [이름, 위도, 경도, 일차]
const stops = [
  ["이스탄불", 41.0082, 28.9784, "1일차 도착"],
  ["데니즐리", 37.7765, 29.0864, "2일차 (국내선)"],
  ["비시디아 안디옥", 38.3050, 31.1894, "2일차"],
  ["밀레도", 37.5306, 27.2786, "4일차"],
  ["에베소", 37.9410, 27.3419, "5일차"],
  ["이즈미르(서머나)", 38.4189, 27.1287, "6일차"],
  ["버가모", 39.1213, 27.1836, "6일차"],
  ["앗소", 39.4900, 26.3380, "7일차"],
  ["트로이", 39.9576, 26.2389, "7일차"],
  ["차낙칼레", 40.1553, 26.4142, "7~8일차"],
  ["이스탄불 ", 41.0082, 28.9784, "8~11일차"]
];

// 핀 + 번호 마커
const seen = {};
let n = 0;
stops.forEach((s, i) => {
  const key = s[0].trim();
  // 같은 도시 중복이면 번호만 새로
  n = i + 1;
  // 일차 정보에서 'N일차' 부분만 추출 (예: "2일차 (국내선)" → "2일차")
  const dayMatch = s[3].match(/[0-9~]+일차/);
  const dayLabel = dayMatch ? dayMatch[0] : s[3];
  const icon = L.divIcon({
    className:'', html:`<div class="pin-num"><span>${n}</span></div>`,
    iconSize:[26,26], iconAnchor:[13,26]
  });
  // 이스탄불은 도착(1일차)·귀환(8~11일차) 두 번 방문 → 라벨이 겹치지 않게 방향 분리
  const isReturnIstanbul = (i === stops.length - 1);
  const ttDir = isReturnIstanbul ? 'bottom' : 'right';
  const ttOffset = isReturnIstanbul ? [0, 8] : [8, -12];
  L.marker([s[1], s[2]], {icon}).addTo(map)
    .bindPopup(`<b>${key}</b><br>${s[3]}`)
    .bindTooltip(`${key} (${dayLabel})`, {permanent:true, direction:ttDir, offset:ttOffset, className:'pin-tt'});
});

// 경로 그리기 (항공: 이스탄불→데니즐리 점선 / 나머지 버스 실선)
function arrowed(latlngs, color, dashed) {
  const pl = L.polyline(latlngs, {
    color, weight:3.5, opacity:0.9,
    dashArray: dashed ? '8,8' : null
  }).addTo(map);
  L.polylineDecorator(pl, {
    patterns:[{offset:'8%', repeat:'18%',
      symbol:L.Symbol.arrowHead({pixelSize:11, polygon:true,
        pathOptions:{stroke:false, fill:true, fillColor:color, fillOpacity:0.95}})}]
  }).addTo(map);
}

// 항공 구간
arrowed([[41.0082,28.9784],[37.7765,29.0864]], TERRA, true);
// 버스 구간 (데니즐리부터 순서대로)
for (let i = 1; i < stops.length - 1; i++) {
  arrowed([[stops[i][1],stops[i][2]],[stops[i+1][1],stops[i+1][2]]], SAGE, false);
}

map.fitBounds(stops.map(s=>[s[1],s[2]]), {padding:[60,60]});
</script>
</body>
</html>
